services:
  backend:
    image: 443100114112.dkr.ecr.eu-north-1.amazonaws.com/devops-blog-backend:latest
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  frontend:
    image: 443100114112.dkr.ecr.eu-north-1.amazonaws.com/devops-blog-frontend:v1.0
    ports:
      - "80:3000"
    depends_on:
      - backend

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
